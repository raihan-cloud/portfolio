<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

  <div id="sidebarPlaceholder"></div>

  <div class="main-content" id="mainContent">
    <div id="navbarPlaceholder"></div>

    <div class="page-content">

      <div class="page-header">
        <h1>Settings</h1>
        <p>Kelola profil dan keamanan akun Anda</p>
      </div>

      <!-- Profile Information -->
      <div class="settings-block">
        <div class="settings-block-header">
          <h3>Profile Information</h3>
          <p>Informasi yang tampil di halaman portfolio publik</p>
        </div>
        <div class="settings-block-body">
          <form id="profileForm" onsubmit="saveProfile(event)">

            <div class="avatar-upload">
              <div class="avatar-preview">R</div>
              <div>
                <input type="file" class="form-input" accept="image/*" style="padding:8px 14px;max-width:280px">
                <div class="form-hint">JPG atau PNG, maks 2MB</div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-input" value="Raihan Muzaffar">
              </div>
              <div class="form-group">
                <label class="form-label">Role / Tagline</label>
                <input type="text" class="form-input" value="Web Developer & Network Engineer">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Bio Singkat</label>
              <textarea class="form-input" rows="3">Seorang web developer dan network engineer yang bersemangat membangun solusi digital. Berpengalaman dalam React, Node.js, dan infrastruktur jaringan.</textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">GitHub</label>
                <input type="url" class="form-input" value="https://github.com/raihanmuzaffar" placeholder="https://github.com/...">
              </div>
              <div class="form-group">
                <label class="form-label">LinkedIn</label>
                <input type="url" class="form-input" value="https://linkedin.com/in/raihanmuzaffar" placeholder="https://linkedin.com/in/...">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Email Publik</label>
                <input type="email" class="form-input" value="raihan@email.com" placeholder="email@domain.com">
              </div>
              <div class="form-group">
                <label class="form-label">Website</label>
                <input type="url" class="form-input" value="https://raihanmuzaffar.my.id" placeholder="https://...">
              </div>
            </div>

            <button type="submit" class="btn btn-primary">Simpan Profil</button>
          </form>
        </div>
      </div>

      <!-- Change Password -->
      <div class="settings-block">
        <div class="settings-block-header">
          <h3>Change Password</h3>
          <p>Perbarui password akun admin Anda</p>
        </div>
        <div class="settings-block-body">
          <form id="passwordForm" onsubmit="changePassword(event)" style="max-width:480px">

            <div class="form-group">
              <label class="form-label">Password Saat Ini</label>
              <input type="password" class="form-input" placeholder="Masukkan password saat ini" required>
            </div>

            <div class="form-group">
              <label class="form-label">Password Baru</label>
              <input type="password" class="form-input" placeholder="Minimal 8 karakter" required minlength="8">
            </div>

            <div class="form-group">
              <label class="form-label">Konfirmasi Password Baru</label>
              <input type="password" class="form-input" placeholder="Ulangi password baru" required>
            </div>

            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
        </div>
      </div>

    </div>

    <div id="footerPlaceholder"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var bc = document.getElementById('breadcrumbCurrent');
      if (bc) bc.textContent = 'Settings';
    });

    function saveProfile(e) {
      e.preventDefault();
      Toast.success('Profile Updated', 'Informasi profil berhasil disimpan.');
    }

    function changePassword(e) {
      e.preventDefault();
      Toast.success('Password Changed', 'Password berhasil diperbarui.');
      e.target.reset();
    }
  </script>
</body>
</html>
